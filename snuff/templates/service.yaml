apiVersion: v1
kind: Service
metadata:
  name: {{ include "snuff.fullname" . }}
  labels:
    {{- include "snuff.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8080
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "snuff.selectorLabels" . | nindent 4 }}
