[package]
name = "logsnuffer"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4.43", features = ["serde"] }
rand = "0.10.0"
redis = { version = "1.0.3", features = ["tokio-comp"] }
seahash = "4.1.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
